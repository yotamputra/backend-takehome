basePath: /
definitions:
  model.BlogResponse:
    properties:
      author:
        $ref: '#/definitions/model.UserResponse'
      comments:
        items:
          $ref: '#/definitions/model.CommentResponse'
        type: array
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  model.CommentResponse:
    properties:
      author_name:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      post_id:
        type: string
    type: object
  model.CreateBlogRequest:
    properties:
      content:
        type: string
      title:
        maxLength: 255
        type: string
    required:
    - content
    - title
    type: object
  model.CreateCommentRequest:
    properties:
      content:
        minLength: 1
        type: string
    required:
    - content
    type: object
  model.LoginRequest:
    properties:
      email:
        maxLength: 100
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  model.LoginResponse:
    properties:
      expires_at:
        type: integer
      token:
        type: string
      user:
        $ref: '#/definitions/model.UserResponse'
    type: object
  model.PageMetadata:
    properties:
      page:
        type: integer
      size:
        type: integer
      total_item:
        type: integer
      total_page:
        type: integer
    type: object
  model.RegisterRequest:
    properties:
      email:
        maxLength: 100
        type: string
      name:
        maxLength: 100
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  model.UpdateBlogRequest:
    properties:
      content:
        type: string
      title:
        maxLength: 255
        type: string
    required:
    - content
    - title
    type: object
  model.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  model.WebResponse-any:
    properties:
      data: {}
      errors: {}
      message:
        type: string
      paging:
        $ref: '#/definitions/model.PageMetadata'
    type: object
  model.WebResponse-array_model_BlogResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.BlogResponse'
        type: array
      errors: {}
      message:
        type: string
      paging:
        $ref: '#/definitions/model.PageMetadata'
    type: object
  model.WebResponse-array_model_CommentResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.CommentResponse'
        type: array
      errors: {}
      message:
        type: string
      paging:
        $ref: '#/definitions/model.PageMetadata'
    type: object
  model.WebResponse-model_BlogResponse:
    properties:
      data:
        $ref: '#/definitions/model.BlogResponse'
      errors: {}
      message:
        type: string
      paging:
        $ref: '#/definitions/model.PageMetadata'
    type: object
  model.WebResponse-model_CommentResponse:
    properties:
      data:
        $ref: '#/definitions/model.CommentResponse'
      errors: {}
      message:
        type: string
      paging:
        $ref: '#/definitions/model.PageMetadata'
    type: object
  model.WebResponse-model_LoginResponse:
    properties:
      data:
        $ref: '#/definitions/model.LoginResponse'
      errors: {}
      message:
        type: string
      paging:
        $ref: '#/definitions/model.PageMetadata'
    type: object
  model.WebResponse-model_UserResponse:
    properties:
      data:
        $ref: '#/definitions/model.UserResponse'
      errors: {}
      message:
        type: string
      paging:
        $ref: '#/definitions/model.PageMetadata'
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a sample blog platform API.
  title: Backend Takehome API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Login and receive token
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-model_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.WebResponse-any'
      summary: Login
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user
      parameters:
      - description: Register Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-model_UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.WebResponse-any'
      summary: Register a new user
      tags:
      - auth
  /api/posts:
    get:
      description: List all blog posts
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-array_model_BlogResponse'
      summary: List all blog posts
      tags:
      - posts
    post:
      consumes:
      - application/json
      description: Create a new blog post
      parameters:
      - description: Create Blog Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateBlogRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-model_BlogResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.WebResponse-any'
      security:
      - BearerAuth: []
      summary: Create a new blog post
      tags:
      - posts
  /api/posts/{id}:
    delete:
      description: Delete a blog post
      parameters:
      - description: Blog ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.WebResponse-any'
      security:
      - BearerAuth: []
      summary: Delete a blog post
      tags:
      - posts
    get:
      description: Get a blog post by ID
      parameters:
      - description: Blog ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-model_BlogResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.WebResponse-any'
      summary: Get a blog post by ID
      tags:
      - posts
    put:
      consumes:
      - application/json
      description: Update a blog post
      parameters:
      - description: Blog ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Blog Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateBlogRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-model_BlogResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.WebResponse-any'
      security:
      - BearerAuth: []
      summary: Update a blog post
      tags:
      - posts
  /api/posts/{id}/comments:
    get:
      description: List all comments for a blog post
      parameters:
      - description: Blog ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-array_model_CommentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.WebResponse-any'
      summary: List all comments for a blog post
      tags:
      - comments
    post:
      consumes:
      - application/json
      description: Add a comment to a blog post
      parameters:
      - description: Blog ID
        in: path
        name: id
        required: true
        type: string
      - description: Create Comment Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse-model_CommentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.WebResponse-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.WebResponse-any'
      security:
      - BearerAuth: []
      summary: Add a comment to a blog post
      tags:
      - comments
  /health:
    get:
      description: Check if the server is running
      produces:
      - application/json
      responses: {}
      summary: Health Check
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
